<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Japan-yua-tokai 商品マスタ（閲覧専用）</title>
<style>
  :root{--accent:#16a34a;--bg:#f9fafb;--surface:#fff;--border:#e5e7eb;--text:#111827;--text2:#6b7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
  header{background:var(--accent);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;}
  header h1{font-size:16px;font-weight:700;}
  header .badge{background:rgba(255,255,255,.2);border-radius:4px;padding:2px 8px;font-size:12px;}
  header .updated{margin-left:auto;font-size:12px;opacity:.8;}
  .readonly-badge{background:#fef9c3;color:#854d0e;border:1px solid #fde047;border-radius:4px;padding:4px 12px;font-size:12px;margin:10px 20px;}
  .toolbar{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);}
  /* タブ＋ツールバー全体を1つのstickyブロックに（iOS Safariでも確実） */
  .sticky-header{position:sticky;top:0;z-index:10;background:var(--surface);}
  .search-box{padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;width:220px;}
  select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#fff;}
  .count{font-size:12px;color:var(--text2);margin-left:auto;}
  .tbl-wrap{overflow-x:auto;padding:0 20px 20px;}
  table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  th{background:#f3f4f6;padding:10px 12px;text-align:left;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
  td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#f9fafb;}
  /* カード（スマホ用） */
  .cards{padding:0 12px 20px;display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--surface);border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .card-title{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .card-title-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;}
  .card-code{font-size:11px;background:#f3f4f6;padding:2px 6px;border-radius:3px;font-family:'Courier New',monospace;margin-right:6px;}
  .card-row{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-top:3px;flex-wrap:wrap;}
  .card-label{font-weight:600;color:#374151;}
  .copy-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .copy-btn:active{background:#f3f4f6;}
  #copy-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e2130;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;z-index:9999;display:none;pointer-events:none;}
  @media(min-width:640px){.cards{display:none;}.tbl-wrap{display:block;}}
  @media(max-width:639px){.hide-sp{display:none;}.cards{display:flex;}}
  code{font-size:11px;background:#f3f4f6;padding:2px 5px;border-radius:3px;font-family:'Courier New',monospace;}
  .badge-s{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .s-active{background:#dcfce7;color:#166534;}
  .s-stop{background:#fef9c3;color:#854d0e;}
  .s-dead{background:#fee2e2;color:#991b1b;}
  .price-hidden{color:transparent;background:#e5e7eb;border-radius:3px;cursor:pointer;user-select:none;}
  .price-hidden:hover::after{content:'タップで表示';}
  .price-show-btn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;color:var(--text2);white-space:nowrap;}
  #price-toggle-row{display:flex;align-items:center;gap:6px;padding:6px 20px;background:#fff8f0;border-bottom:1px solid #fed7aa;font-size:12px;color:#92400e;}

  .tabs{display:flex;gap:0;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{padding:12px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);}
  .tab.active{border-bottom-color:var(--accent);color:var(--accent);font-weight:600;}
  .page{display:none;} .page.active{display:block;}
  .no-data{text-align:center;padding:40px;color:var(--text2);}
  /* ツールバー切り替え用 */
  .tab-toolbar{display:none;} .tab-toolbar.active{display:block;}
</style>
</head>
<body>
<header>
  <h1>Japan-yua-tokai 統合マスタ</h1>
  <span class="badge">閲覧専用</span>
  <span class="updated" id="updated-at"></span>
</header>
<div class="readonly-badge">👁 このページは閲覧専用です。データの変更は社内ツール（localhost:8585）から行ってください。</div>

<!-- タブ＋ツールバーを1つのstickyブロックにまとめる -->
<div class="sticky-header">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('products')">商品マスタ</div>
    <div class="tab" onclick="switchTab('customers')">取引先マスタ</div>
    <div class="tab" onclick="switchTab('suppliers')">手配先マスタ</div>
  </div>

  <!-- 商品マスタ用ツールバー -->
  <div id="st-products" class="tab-toolbar active">
    <div class="toolbar">
      <input class="search-box" id="p-search" placeholder="商品名・コード・手配先で検索..." oninput="renderProducts()">
      <select id="p-status" onchange="renderProducts()">
        <option value="">すべての状態</option>
        <option>販売中</option><option>販売停止</option><option>廃番</option>
      </select>
      <select id="p-supplier" onchange="renderProducts()"><option value="">すべての手配先</option></select>
      <span class="count" id="p-count"></span>
    </div>
    <div id="price-toggle-row" style="display:flex;align-items:center;gap:8px;padding:6px 20px;background:#fff8f0;border-bottom:1px solid #fed7aa;font-size:12px;color:#92400e;">
      🔒 原単価は非表示です
      <button onclick="togglePrice()" id="price-btn" style="font-size:11px;padding:3px 10px;border:1px solid #f97316;border-radius:4px;background:#fff;cursor:pointer;color:#c2410c;">表示する</button>
    </div>
  </div>

  <!-- 取引先マスタ用ツールバー -->
  <div id="st-customers" class="tab-toolbar">
    <div class="toolbar">
      <input class="search-box" id="c-search" placeholder="店舗名・コードで検索..." oninput="renderCustomers()">
      <select id="c-system" onchange="renderCustomers()">
        <option value="">すべての区分</option>
        <option>タノム</option><option>その他</option><option>インフォマート</option><option>アスピット</option>
      </select>
      <span class="count" id="c-count"></span>
    </div>
  </div>

  <!-- 手配先マスタ用ツールバー -->
  <div id="st-suppliers" class="tab-toolbar">
    <div class="toolbar">
      <input class="search-box" id="s-search" placeholder="手配先名・コードで検索..." oninput="renderSuppliers()">
      <span class="count" id="s-count"></span>
    </div>
  </div>
</div>

<!-- 商品マスタ（データのみ） -->
<div id="page-products" class="page active">
  <div class="tbl-wrap hide-sp">
    <table>
      <thead><tr><th>商品コード</th><th>商品名称</th><th>フリガナ</th><th>手配先</th><th>単位</th><th>原単価</th><th>旧コード</th><th>状態</th></tr></thead>
      <tbody id="p-tbody"><tr><td colspan="8" class="no-data">読み込み中...</td></tr></tbody>
    </table>
  </div>
  <div class="cards" id="p-cards"></div>
</div>

<!-- 取引先マスタ（データのみ） -->
<div id="page-customers" class="page">
  <div class="tbl-wrap hide-sp">
    <table>
      <thead><tr><th>取引先コード</th><th>店舗名</th><th>法人名</th><th>システム区分</th><th>担当者</th><th>電話番号</th></tr></thead>
      <tbody id="c-tbody"><tr><td colspan="6" class="no-data">読み込み中...</td></tr></tbody>
    </table>
  </div>
  <div class="cards" id="c-cards"></div>
</div>

<!-- 手配先マスタ（データのみ） -->
<div id="page-suppliers" class="page">
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>手配先コード</th><th>手配先名称</th><th>フリガナ</th></tr></thead>
      <tbody id="s-tbody"><tr><td colspan="3" class="no-data">読み込み中...</td></tr></tbody>
    </table>
  </div>
</div>

<div id="copy-toast">コピーしました</div>

<script>
let allData = { products: [], customers: [], suppliers: [], updated: '' };

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  const t = document.getElementById('copy-toast');
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 1500);
}

function matchQuery(q, ...fields) {
  if (!q) return true;
  const terms = q.trim().split(/\s+/).filter(Boolean);
  const text = fields.filter(Boolean).join(' ').toLowerCase();
  return terms.every(t => text.includes(t));
}

fetch('data.json?v=' + Date.now())
  .then(r => r.json())
  .then(d => {
    allData = d;
    document.getElementById('updated-at').textContent = 'データ更新日時: ' + d.updated;
    const names = [...new Set(d.products.map(p => p.supplier_name).filter(Boolean))].sort();
    const sel = document.getElementById('p-supplier');
    sel.innerHTML = '<option value="">すべての手配先</option>' + names.map(n => `<option>${n}</option>`).join('');
    renderProducts(); renderCustomers(); renderSuppliers();
  })
  .catch(() => {
    ['p-tbody','c-tbody','s-tbody'].forEach(id =>
      document.getElementById(id).innerHTML = '<tr><td colspan="8" class="no-data">データを読み込めませんでした</td></tr>');
  });

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['products','customers','suppliers'][i] === name);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab-toolbar').forEach(el => el.classList.remove('active'));
  document.getElementById('st-' + name).classList.add('active');
}

let priceVisible = false;
function togglePrice() {
  priceVisible = !priceVisible;
  document.getElementById('price-btn').textContent = priceVisible ? '隠す' : '表示する';
  document.getElementById('price-toggle-row').style.background = priceVisible ? '#f0fdf4' : '#fff8f0';
  document.getElementById('price-toggle-row').style.borderBottomColor = priceVisible ? '#86efac' : '#fed7aa';
  document.getElementById('price-toggle-row').style.color = priceVisible ? '#166534' : '#92400e';
  document.getElementById('price-toggle-row').firstChild.textContent = priceVisible ? '🔓 原単価を表示中' : '🔒 原単価は非表示です';
  document.getElementById('price-btn').style.borderColor = priceVisible ? '#16a34a' : '#f97316';
  document.getElementById('price-btn').style.color = priceVisible ? '#15803d' : '#c2410c';
  renderProducts();
}

function statusClass(s) {
  return s==='販売中'?'s-active':s==='販売停止'?'s-stop':'s-dead';
}

function renderProducts() {
  const q   = document.getElementById('p-search').value.toLowerCase();
  const st  = document.getElementById('p-status').value;
  const sup = document.getElementById('p-supplier').value;
  const list = allData.products.filter(p =>
    matchQuery(q, p.name, p.code, p.supplier_name, p.code_old, p.kana) &&
    (!st  || p.status === st) &&
    (!sup || p.supplier_name === sup)
  );
  document.getElementById('p-count').textContent = `${list.length}件表示（全${allData.products.length}件）`;
  const noP = '<tr><td colspan="8" class="no-data">該当なし</td></tr>';
  document.getElementById('p-tbody').innerHTML = list.length === 0 ? noP
    : list.map(p => `<tr>
        <td><code>${p.code}</code></td>
        <td>${p.name}</td>
        <td style="color:var(--text2);font-size:12px;">${p.kana||''}</td>
        <td>${p.supplier_name||''}</td>
        <td style="color:var(--text2);">${p.unit||''}</td>
        <td style="text-align:right;font-weight:600;">${priceVisible ? '¥'+(p.price||0).toLocaleString() : '———'}</td>
        <td><code style="font-size:11px;">${p.code_old||''}</code></td>
        <td><span class="badge-s ${statusClass(p.status)}">${p.status}</span></td>
      </tr>`).join('');
  document.getElementById('p-cards').innerHTML = list.length === 0
    ? '<div style="text-align:center;padding:40px;color:var(--text2);">該当なし</div>'
    : list.map(p => {
        const copyVal = (p.code + ' ' + p.name).replace(/'/g, "\\'");
        return `<div class="card">
        <div class="card-title">
          <div class="card-title-left">
            <span class="card-code">${p.code}</span>
            <span class="badge-s ${statusClass(p.status)}" style="font-size:11px;">${p.status}</span>
          </div>
          <button class="copy-btn" onclick="copyText('${copyVal}')">📋 コピー</button>
        </div>
        <div style="font-size:14px;font-weight:600;margin:4px 0;">${p.name}</div>
        <div class="card-row">
          <span class="card-label">手配先</span>${p.supplier_name||''}
          <span class="card-label">単位</span>${p.unit||''}
          <span class="card-label">原単価</span>${priceVisible ? '¥'+(p.price||0).toLocaleString() : '———'}
        </div>
        ${p.code_old ? `<div class="card-row"><span class="card-label">旧コード</span><code>${p.code_old}</code></div>` : ''}
      </div>`;
      }).join('');
}

function renderCustomers() {
  const q  = document.getElementById('c-search').value.toLowerCase();
  const sy = document.getElementById('c-system').value;
  const list = allData.customers.filter(c =>
    matchQuery(q, c.store, c.code, c.corp, c.kana) &&
    (!sy || c.system === sy)
  );
  document.getElementById('c-count').textContent = `${list.length}件表示（全${allData.customers.length}件）`;
  const noC = '<tr><td colspan="6" class="no-data">該当なし</td></tr>';
  document.getElementById('c-tbody').innerHTML = list.length === 0 ? noC
    : list.map(c => `<tr>
        <td><code>${c.code||''}</code></td>
        <td>${c.store||''}</td>
        <td style="color:var(--text2);">${c.corp||''}</td>
        <td>${c.system||''}</td>
        <td style="color:var(--text2);">${c.person||''}</td>
        <td style="color:var(--text2);">${c.tel||''}</td>
      </tr>`).join('');
  document.getElementById('c-cards').innerHTML = list.length === 0
    ? '<div style="text-align:center;padding:40px;color:var(--text2);">該当なし</div>'
    : list.map(c => `<div class="card">
        <div class="card-title">
          <span class="card-code">${c.code||''}</span>
          <span style="font-size:12px;color:var(--text2);">${c.system||''}</span>
        </div>
        <div style="font-size:14px;font-weight:600;margin:4px 0;">${c.store||''}</div>
        <div class="card-row"><span class="card-label">法人名</span>${c.corp||''}</div>
        <div class="card-row">
          <span class="card-label">担当</span>${c.person||''}
          ${c.tel ? `　<span class="card-label">TEL</span><a href="tel:${c.tel}" style="color:var(--accent);">${c.tel}</a>` : ''}
        </div>
      </div>`).join('');
}

function renderSuppliers() {
  const q = document.getElementById('s-search').value.toLowerCase();
  const list = allData.suppliers.filter(s =>
    !q || (s.name||'').toLowerCase().includes(q) || (s.code||'').includes(q)
  );
  document.getElementById('s-count').textContent = `${list.length}件表示（全${allData.suppliers.length}件）`;
  document.getElementById('s-tbody').innerHTML = list.length === 0
    ? '<tr><td colspan="3" class="no-data">該当なし</td></tr>'
    : list.map(s => `<tr>
        <td><code>${s.code||''}</code></td>
        <td>${s.name||''}</td>
        <td style="color:var(--text2);">${s.kana||''}</td>
      </tr>`).join('');
}
</script>
</body>
</html>
